<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Details | Nguyen Vu Xuan Mai</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body class="bg-[#fdfdfb] text-zinc-900 antialiased">
    <nav class="fixed top-0 left-0 right-0 z-50 px-6 py-6">
      <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-3 rounded-full bg-white/95 backdrop-blur-lg border border-zinc-200 shadow-sm">
        <a href="/" class="flex items-center gap-2 group">
          <div class="w-10 h-10 bg-brand-500 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg shadow-brand-500/20 group-hover:rotate-12 transition-transform">
            <i data-lucide="arrow-left" class="w-6 h-6"></i>
          </div>
          <span class="font-display font-bold text-xl tracking-tight">Back to Portfolio</span>
        </a>
      </div>
    </nav>

    <main class="pt-32 pb-20 px-6">
      <div id="project-content" class="max-w-5xl mx-auto">
        <!-- Content will be injected by JavaScript -->
        <div class="flex items-center justify-center min-h-[50vh]">
          <div class="animate-pulse text-zinc-400 font-bold">Loading project details...</div>
        </div>
      </div>
    </main>

    <footer class="py-10 px-6 border-t border-zinc-200">
      <div class="max-w-7xl mx-auto text-center">
        <p class="text-sm font-medium text-zinc-500">
          © <span id="year"></span> Nguyen Vu Xuan Mai. Designed with ❤️
        </p>
      </div>
    </footer>

    <script>
      const projects = {
        1: {
          title: "Watermelon Shop",
          description: "A delightful e-commerce experience for watermelon lovers. This project focuses on a vibrant and refreshing UI that matches the product's identity.",
          images: ["/images/project-1-1.jpg", "/images/project-1-2.jpg", "/images/project-1-3.jpg"],
          seeds: ["watermelon", "fruit", "shop"],
          role: "Web Developer",
          tools: ["HTML", "CSS", "JavaScript", "Bootstrap"]
        },
        2: {
          title: "Watermelon Music Festival",
          description: "Branding and interface design for the ultimate summer festival. The design captures the energy and excitement of a large-scale community event.",
          images: ["/images/project-2-1.jpg", "/images/project-2-2.jpg", "/images/project-2-3.jpg", "/images/project-2-4.jpg", "/images/project-2-5.jpg", "/images/project-2-6.jpg"],
          seeds: ["festival", "concert", "summer", "party", "event", "music"],
          role: "Web Developer",
          tools: ["HTML", "CSS", "JavaScript", "Bootstrap"]
        },
        3: {
          title: "Meowlish",
          description: "A playful platform for cat enthusiasts to connect and share. The interface is designed to be friendly, accessible, and full of personality.",
          demoLink: "https://imfishball.framer.website/chitiet/trang-chu",
          flowImage: "/images/project-3-flow.jpg",
          images: ["/images/project-3-1.jpg", "/images/project-3-2.jpg", "/images/project-3-3.jpg", "/images/project-3-4.jpg", "/images/project-3-5.jpg", "/images/project-3-6.jpg", "/images/project-3-7.jpg"],
          seeds: ["cat", "pet", "kitten", "animal", "social", "community", "playful"],
          role: "UI/UX Designer",
          tools: ["Framer", "Procreate"]
        },
        4: {
          title: "Soundly",
          description: "A new way to experience and discover music. This project explores dark mode aesthetics and fluid motion for a premium audio experience.",
          demoLink: "https://www.figma.com/proto/AaMitEGHtijZykVF5xurET/Web-nh%E1%BA%A1c?node-id=34-3&t=RsLmEIl3UbhO9yVZ-1",
          images: [
            "/images/project-4-1.jpg", "/images/project-4-2.jpg", "/images/project-4-3.jpg",
            "/images/project-4-4.jpg", "/images/project-4-5.jpg", "/images/project-4-6.jpg",
            "/images/project-4-7.jpg", "/images/project-4-8.jpg", "/images/project-4-9.jpg"
          ],
          seeds: ["music", "audio", "headphones", "concert", "vinyl", "sound", "studio", "artist", "instrument"],
          role: "UI Designer",
          tools: ["Figma", "Illustrator"]
        }
      };

      function loadProject() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const project = projects[id];
        const content = document.getElementById('project-content');

        if (!project) {
          content.innerHTML = `
            <div class="text-center py-20">
              <h1 class="text-4xl font-bold mb-4">Project Not Found</h1>
              <a href="/" class="text-brand-600 font-bold hover:underline">Return to Home</a>
            </div>
          `;
          return;
        }

        document.title = `${project.title} | Nguyen Vu Xuan Mai`;

        let imagesHtml = '';
        
        if (project.flowImage) {
          imagesHtml += `
            <div class="reveal rounded-2xl overflow-hidden shadow-md border-2 border-zinc-200 mb-16 max-w-4xl mx-auto bg-white">
              <img src="${project.flowImage}" onerror="this.src='https://picsum.photos/seed/flowchart/1200/800'" alt="${project.title} Flow Diagram" class="w-full h-auto object-contain bg-zinc-50" />
            </div>
            <hr class="border-zinc-200 mb-16 max-w-4xl mx-auto w-full" />
          `;
        }

        project.images.forEach((img, index) => {
          const seed = project.seeds[index] || 'design';
          imagesHtml += `
            <div class="reveal rounded-2xl overflow-hidden shadow-md border-2 border-zinc-200 mb-8 max-w-4xl mx-auto bg-white">
              <img src="${img}" onerror="this.src='https://picsum.photos/seed/${seed}/1200/800'" alt="${project.title}" class="w-full h-auto object-contain bg-zinc-50" />
            </div>
          `;
        });

        content.innerHTML = `
          <div class="flex flex-col gap-12">
            <div class="reveal">
              <h1 class="text-5xl md:text-7xl font-display font-black text-zinc-900 mb-6 leading-tight">${project.title}</h1>
              <div class="flex flex-wrap gap-4 mb-8">
                <span class="px-6 py-2 rounded-full bg-brand-50 text-brand-600 text-sm font-black uppercase tracking-wider border border-brand-200 shadow-sm">${project.role}</span>
                ${project.tools.map(tool => `<span class="px-6 py-2 rounded-full bg-zinc-100 text-zinc-600 text-sm font-bold uppercase tracking-wider border border-zinc-200 shadow-sm">${tool}</span>`).join('')}
              </div>
              <p class="text-zinc-600 text-xl leading-relaxed font-medium max-w-4xl">${project.description}</p>
              ${project.demoLink ? `
              <div class="mt-8">
                <a href="${project.demoLink}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-3 px-8 py-4 bg-zinc-900 text-white rounded-full font-bold hover:bg-brand-600 hover:scale-105 transition-all shadow-xl shadow-zinc-900/20">
                  <i data-lucide="external-link" class="w-5 h-5"></i>
                  View Live Prototype
                </a>
              </div>
              ` : ''}
            </div>
            
            <div class="grid grid-cols-1 gap-6">
              ${imagesHtml}
            </div>

            <div class="reveal text-center pt-12">
              <a href="/" class="inline-flex items-center gap-3 px-8 py-4 bg-brand-600 text-white rounded-full font-bold hover:bg-brand-700 hover:scale-105 transition-all shadow-xl shadow-brand-600/20">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Back to All Projects
              </a>
            </div>
          </div>
        `;

        // Trigger reveal animation
        setTimeout(() => {
          document.querySelectorAll('.reveal').forEach(el => el.classList.add('animate-in'));
        }, 100);

        lucide.createIcons();
      }

      document.getElementById('year').textContent = new Date().getFullYear();
      loadProject();
    </script>
  </body>
</html>
